<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="560" fill="#0d1117"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="600">SOC Home Lab — Architecture</text>
  <text x="450" y="58" text-anchor="middle" fill="#7d8590" font-size="12">Wazuh SIEM/EDR · Shuffle SOAR · TheHive Case Management</text>

  <!-- Endpoints box -->
  <rect x="30" y="90" width="180" height="150" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="120" y="114" text-anchor="middle" fill="#7d8590" font-size="11" font-weight="600">MONITORED ENDPOINTS</text>
  <rect x="50" y="124" width="140" height="32" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="120" y="145" text-anchor="middle" fill="#60a5fa" font-size="12">🪟 Windows VM</text>
  <rect x="50" y="164" width="140" height="32" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="120" y="185" text-anchor="middle" fill="#34d399" font-size="12">🐧 Linux VM</text>
  <rect x="50" y="204" width="140" height="28" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="120" y="222" text-anchor="middle" fill="#f87171" font-size="12">🎯 DVWA Target</text>

  <!-- Wazuh box -->
  <rect x="340" y="80" width="220" height="180" rx="8" fill="#161b22" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="340" y="80" width="220" height="32" rx="8" fill="#1d4ed8"/>
  <rect x="340" y="96" width="220" height="16" fill="#1d4ed8"/>
  <text x="450" y="101" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">WAZUH</text>
  <text x="450" y="130" text-anchor="middle" fill="#93c5fd" font-size="11">SIEM / EDR / FIM</text>
  <line x1="360" y1="142" x2="540" y2="142" stroke="#30363d" stroke-width="1"/>
  <text x="370" y="160" fill="#7d8590" font-size="11">Manager</text>
  <text x="510" y="160" text-anchor="end" fill="#34d399" font-size="11">● Active</text>
  <text x="370" y="178" fill="#7d8590" font-size="11">Indexer (OpenSearch)</text>
  <text x="510" y="178" text-anchor="end" fill="#34d399" font-size="11">● Active</text>
  <text x="370" y="196" fill="#7d8590" font-size="11">Dashboard</text>
  <text x="510" y="196" text-anchor="end" fill="#34d399" font-size="11">● Active</text>
  <text x="370" y="214" fill="#7d8590" font-size="11">Agent → Port 1514/TCP</text>
  <text x="510" y="232" text-anchor="end" fill="#fbbf24" font-size="10">:443 / :9200</text>

  <!-- Shuffle box -->
  <rect x="340" y="300" width="220" height="140" rx="8" fill="#161b22" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="340" y="300" width="220" height="32" rx="8" fill="#b45309"/>
  <rect x="340" y="316" width="220" height="16" fill="#b45309"/>
  <text x="450" y="321" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">SHUFFLE SOAR</text>
  <text x="450" y="350" text-anchor="middle" fill="#fcd34d" font-size="11">Playbook Automation</text>
  <line x1="360" y1="362" x2="540" y2="362" stroke="#30363d" stroke-width="1"/>
  <text x="370" y="380" fill="#7d8590" font-size="11">Webhook trigger (Wazuh)</text>
  <text x="370" y="398" fill="#7d8590" font-size="11">VirusTotal enrichment</text>
  <text x="370" y="416" fill="#7d8590" font-size="11">TheHive case creation</text>
  <text x="510" y="430" text-anchor="end" fill="#fbbf24" font-size="10">:3001</text>

  <!-- TheHive box -->
  <rect x="650" y="190" width="220" height="150" rx="8" fill="#161b22" stroke="#10b981" stroke-width="1.5"/>
  <rect x="650" y="190" width="220" height="32" rx="8" fill="#065f46"/>
  <rect x="650" y="206" width="220" height="16" fill="#065f46"/>
  <text x="760" y="211" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">TheHive 5</text>
  <text x="760" y="240" text-anchor="middle" fill="#6ee7b7" font-size="11">Case Management</text>
  <line x1="670" y1="252" x2="850" y2="252" stroke="#30363d" stroke-width="1"/>
  <text x="670" y="270" fill="#7d8590" font-size="11">Auto case creation</text>
  <text x="670" y="288" fill="#7d8590" font-size="11">Alert enrichment</text>
  <text x="670" y="306" fill="#7d8590" font-size="11">Analyst assignment</text>
  <text x="850" y="326" text-anchor="end" fill="#fbbf24" font-size="10">:9000</text>

  <!-- Arrows: Endpoints → Wazuh -->
  <line x1="210" y1="165" x2="338" y2="165" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowblue)"/>
  <text x="274" y="158" text-anchor="middle" fill="#7d8590" font-size="10">Logs / Events</text>

  <!-- Arrows: Wazuh → Shuffle -->
  <line x1="450" y1="262" x2="450" y2="298" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arroworange)"/>
  <text x="475" y="284" fill="#7d8590" font-size="10">Webhook alert</text>

  <!-- Arrows: Shuffle → TheHive -->
  <line x1="562" y1="370" x2="648" y2="295" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowgreen)"/>
  <text x="618" y="345" text-anchor="middle" fill="#7d8590" font-size="10">Create case</text>

  <!-- Arrows: Wazuh → TheHive -->
  <line x1="562" y1="165" x2="648" y2="235" stroke="#6366f1" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowpurple)"/>
  <text x="618" y="188" text-anchor="middle" fill="#7d8590" font-size="10">Direct alerts</text>

  <!-- Docker label -->
  <rect x="20" y="470" width="860" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="494" text-anchor="middle" fill="#7d8590" font-size="11" font-weight="600">DOCKER COMPOSE — All services containerised on single host</text>
  <text x="140" y="516" text-anchor="middle" fill="#60a5fa" font-size="11">wazuh-manager</text>
  <text x="310" y="516" text-anchor="middle" fill="#60a5fa" font-size="11">wazuh-indexer</text>
  <text x="450" y="516" text-anchor="middle" fill="#60a5fa" font-size="11">wazuh-dashboard</text>
  <text x="600" y="516" text-anchor="middle" fill="#fbbf24" font-size="11">shuffle-frontend</text>
  <text x="760" y="516" text-anchor="middle" fill="#34d399" font-size="11">thehive · cassandra</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowblue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arroworange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowgreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrowpurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>
</svg>
