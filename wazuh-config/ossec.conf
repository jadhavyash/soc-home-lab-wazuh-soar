<!-- Wazuh Manager config for SOC Docker lab — Author: Yash Jadhav -->
<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <email_notification>no</email_notification>
  </global>
  <alerts>
    <log_alert_level>3</log_alert_level>
  </alerts>
  <!-- Forward level 10+ alerts to Shuffle SOAR -->
  <integration>
    <name>shuffle</name>
    <hook_url>http://shuffle-backend:5001/api/v1/hooks/REPLACE_WITH_YOUR_HOOK_ID</hook_url>
    <level>10</level>
    <alert_format>json</alert_format>
  </integration>
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <directories check_all="yes" realtime="yes">/etc,/usr/bin,/sbin</directories>
  </syscheck>
</ossec_config>
